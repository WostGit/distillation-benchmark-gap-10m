name: distillation-humaneval-gap-10m

on:
  workflow_dispatch:

concurrency:
  group: distillation-humaneval-gap-10m-${{ github.ref }}
  cancel-in-progress: false

jobs:
  humaneval-gap:
    runs-on: macos-latest
    timeout-minutes: 10

    env:
      PYTHONUNBUFFERED: "1"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      VENV_DIR: ${{ github.workspace }}/.venv
      OUT_DIR: ${{ github.workspace }}/humaneval_gap_outputs

      TEACHER_MODEL: mlx-community/Qwen2.5-1.5B-Instruct-bf16
      STUDENT_MODEL: mlx-community/Qwen2.5-0.5B-Instruct-bf16

      HUMANEVAL_LIMIT: "3"
      MAX_NEW_TOKENS_CODE: "64"
      EXEC_TIMEOUT_SECONDS: "4"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-${{ runner.arch }}-pip-humaneval-gap-v3
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pip-humaneval-gap-
            ${{ runner.os }}-${{ runner.arch }}-pip-

      - name: Cache Hugging Face files
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.hf-cache
          key: ${{ runner.os }}-${{ runner.arch }}-hf-humaneval-gap-qwen25-1p5b-0p5b-v3
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-hf-humaneval-gap-qwen25-1p5b-0p5b-
            ${{ runner.os }}-${{ runner.arch }}-hf-

      - name: Create venv and install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          python -m venv "${VENV_DIR}"
          "${VENV_DIR}/bin/python" -m pip install --upgrade pip setuptools wheel
          "${VENV_DIR}/bin/python" -m pip install mlx-lm datasets numpy

      - name: Write HumanEval comparison harness
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p scripts
          mkdir -p "${OUT_DIR}"

          cat > scripts/humaneval_gap.py << 'PY'
          import ast
          import json
          import multiprocessing as mp
          import os
          import platform
          import re
          import statistics
          import sys
          import textwrap
          import time
          import traceback

          import mlx.core as mx
          from datasets import load_dataset
          from mlx_lm import load


          OUT_DIR = os.environ["OUT_DIR"]
          TEACHER_MODEL = os.environ["TEACHER_MODEL"]
          STUDENT_MODEL = os.environ["STUDENT_MODEL"]
          HUMANEVAL_LIMIT = int(os.environ["HUMANEVAL_LIMIT"])
          MAX_NEW_TOKENS_CODE = int(os.environ["MAX_NEW_TOKENS_CODE"])
          EXEC_TIMEOUT_SECONDS = int(os.environ["EXEC_TIMEOUT_SECONDS"])


          def now():
              return time.perf_counter()


          def banner(title):
              print("\n" + "=" * 140)
              print(title)
              print("=" * 140)


          def section(title):
              print("\n" + "-" * 140)
              print(title)
              print("-" * 140)


          def greedy_generate(model, tok, prompt, max_new_tokens):
              prompt_ids = tok.encode(prompt)
              current = mx.array([prompt_ids])
              out = []
              t0 = now()

              for i in range(max_new_tokens):
                  logits = model(current)[:, -1, :]
                  nxt = mx.argmax(logits, axis=-1)
                  token_id = int(nxt.item())
                  out.append(token_id)

                  if i < 4 or (i + 1) % 16 == 0:
                      recent = tok.decode(out[-8:])
                      print(f"[GEN TRACE] step={i+1:03d} token_id={token_id} recent={repr(recent)}")

                  current = mx.concatenate([current, nxt[None, :]], axis=1)
                  if token_id == tok.eos_token_id:
                      print(f"[GEN TRACE] eos at step={i+1}")
                      break

              elapsed = now() - t0
              text = tok.decode(out).strip()
              return {
                  "text": text,
                  "elapsed": elapsed,
                  "generated_tokens": len(out),
                  "tps": (len(out) / elapsed) if elapsed > 0 else 0.0,
              }


          def build_generation_prompt(task):
              return (
                  "Complete the Python function below.\n"
                  "Return only valid Python statements for the function body.\n"
                  "Do not repeat the function signature.\n"
                  "Do not repeat the docstring.\n"
                  "Do not include markdown fences.\n"
                  "Do not include explanations.\n\n"
                  f"{task['prompt']}\n"
              )


          def load_tasks():
              section("[1] LOAD HUMANEVAL DATA")
              ds = load_dataset("openai/openai_humaneval", split="test")
              tasks = []
              for i, row in enumerate(ds.select(range(min(HUMANEVAL_LIMIT, len(ds))))):
                  tasks.append({
                      "task_id": row["task_id"],
                      "prompt": row["prompt"],
                      "test": row["test"],
                      "entry_point": row["entry_point"],
                      "max_new_tokens": MAX_NEW_TOKENS_CODE,
                  })
              print(f"[DATA SUMMARY] humaneval_items={len(tasks)}")
              return tasks


          def truncate_generation(text):
              if not text:
                  return ""

              cut_markers = [
                  "<|endoftext|>",
                  "\nHuman:",
                  "\nAssistant:",
                  "\n```",
                  "\r\nHuman:",
                  "\r\nAssistant:",
                  "# Function body ends here",
                  "# End of function body",
              ]

              cut = len(text)
              for marker in cut_markers:
                  idx = text.find(marker)
                  if idx != -1:
                      cut = min(cut, idx)

              text = text[:cut].strip()

              m = re.search(r"```(?:python)?\n(.*?)```", text, re.DOTALL | re.IGNORECASE)
              if m:
                  text = m.group(1).strip()

              return text.strip()


          def extract_body_from_full_function(code, entry_point):
              try:
                  tree = ast.parse(code)
              except Exception:
                  return None

              for node in tree.body:
                  if isinstance(node, ast.FunctionDef) and node.name == entry_point:
                      lines = code.splitlines()
                      if not node.body:
                          return "pass"

                      start = node.body[0].lineno - 1
                      end = node.body[-1].end_lineno
                      body_lines = lines[start:end]
                      return "\n".join(body_lines)
              return None


          def normalize_body(text, entry_point):
              code = truncate_generation(text)

              full_fn_body = extract_body_from_full_function(code, entry_point)
              if full_fn_body is not None:
                  code = full_fn_body

              lines = code.splitlines()

              cleaned = []
              for line in lines:
                  stripped = line.strip()

                  if stripped.startswith("def "):
                      break
                  if stripped.startswith("from "):
                      break
                  if stripped.startswith("import "):
                      break
                  if stripped.startswith("Human:"):
                      break
                  if stripped.startswith("Assistant:"):
                      break
                  if stripped.startswith("```"):
                      break
                  if stripped.startswith('"""') or stripped.startswith("'''"):
                      break

                  cleaned.append(line.rstrip())

              while cleaned and cleaned[0].strip() == "":
                  cleaned.pop(0)
              while cleaned and cleaned[-1].strip() == "":
                  cleaned.pop()

              if not cleaned:
                  return "    pass"

              body = "\n".join(cleaned)

              # Preserve relative indentation, only strip common leading whitespace.
              body = textwrap.dedent(body).strip("\n")

              # If the model returned top-level statements, indent them once for the function body.
              body = textwrap.indent(body, "    ")

              return body if body.strip() else "    pass"


          def _exec_worker(code, queue):
              try:
                  ns = {}
                  exec(code, ns, ns)
                  queue.put({"passed": True, "error": None})
              except Exception:
                  queue.put({"passed": False, "error": traceback.format_exc()})


          def run_tests(candidate_body_text, task):
              body = normalize_body(candidate_body_text, task["entry_point"])
              full_code = task["prompt"] + "\n" + body + "\n" + task["test"] + f"\ncheck({task['entry_point']})\n"

              queue = mp.Queue()
              p = mp.Process(target=_exec_worker, args=(full_code, queue))
              p.start()
              p.join(EXEC_TIMEOUT_SECONDS)

              if p.is_alive():
                  p.terminate()
                  p.join()
                  return False, "Execution timed out", full_code, body

              if queue.empty():
                  return False, "No result returned", full_code, body

              result = queue.get()
              return result["passed"], result["error"], full_code, body


          def run_model(model_name, tasks, role_name):
              section(f"[2] LOAD {role_name.upper()} MODEL")
              t0 = now()
              model, tok = load(model_name)
              model.eval()
              load_seconds = now() - t0
              print(f"[MODEL LOAD] role={role_name} seconds={load_seconds:.4f}")

              outputs = []
              tps_values = []

              for idx, task in enumerate(tasks):
                  print(f"\n[ITEM START] role={role_name} idx={idx+1}/{len(tasks)} task_id={task['task_id']}")
                  print("[PROMPT PREVIEW]")
                  print(task["prompt"][:500])

                  gen = greedy_generate(model, tok, build_generation_prompt(task), task["max_new_tokens"])
                  passed, error, full_code, body = run_tests(gen["text"], task)
                  tps_values.append(gen["tps"])

                  item = {
                      "task_id": task["task_id"],
                      "entry_point": task["entry_point"],
                      "raw_output": gen["text"],
                      "candidate_body": body,
                      "passed": passed,
                      "error": error,
                      "generated_tokens": gen["generated_tokens"],
                      "seconds": round(gen["elapsed"], 4),
                      "tps": round(gen["tps"], 4),
                      "full_executed_code": full_code,
                  }
                  outputs.append(item)

                  print(f"[ITEM RESULT] role={role_name} passed={passed}")
                  print(f"[ITEM RESULT] role={role_name} generated_tokens={gen['generated_tokens']} seconds={gen['elapsed']:.4f} tps={gen['tps']:.4f}")
                  if error:
                      print(f"[ITEM ERROR] {error[:800]}")
                  print(f"[RAW OUTPUT] {repr(gen['text'][:400])}")
                  print(f"[NORMALIZED BODY] {repr(body[:400])}")

              summary = {
                  "role": role_name,
                  "model": model_name,
                  "load_seconds": round(load_seconds, 4),
                  "item_count": len(outputs),
                  "pass_rate": round(sum(1 for x in outputs if x["passed"]) / len(outputs), 4) if outputs else None,
                  "mean_tps": round(statistics.mean(tps_values), 4) if tps_values else None,
                  "min_tps": round(min(tps_values), 4) if tps_values else None,
                  "max_tps": round(max(tps_values), 4) if tps_values else None,
              }

              return outputs, summary


          def compare(tasks, teacher_outputs, student_outputs):
              section("[4] COMPARE TEACHER VS STUDENT")
              teacher_by_id = {x["task_id"]: x for x in teacher_outputs}
              student_by_id = {x["task_id"]: x for x in student_outputs}

              verbose_rows = []
              counts = {
                  "teacher_only_pass": 0,
                  "student_only_pass": 0,
                  "both_pass": 0,
                  "both_fail": 0,
              }

              for task in tasks:
                  tid = task["task_id"]
                  t = teacher_by_id[tid]
                  s = student_by_id[tid]

                  if t["passed"] and not s["passed"]:
                      bucket = "teacher_only_pass"
                  elif s["passed"] and not t["passed"]:
                      bucket = "student_only_pass"
                  elif s["passed"] and t["passed"]:
                      bucket = "both_pass"
                  else:
                      bucket = "both_fail"

                  counts[bucket] += 1

                  row = {
                      "task_id": tid,
                      "entry_point": task["entry_point"],
                      "bucket": bucket,
                      "prompt": task["prompt"],
                      "teacher_passed": t["passed"],
                      "teacher_output": t["raw_output"],
                      "teacher_body": t["candidate_body"],
                      "teacher_error": t["error"],
                      "student_passed": s["passed"],
                      "student_output": s["raw_output"],
                      "student_body": s["candidate_body"],
                      "student_error": s["error"],
                  }
                  verbose_rows.append(row)

                  print(f"[COMPARE] task_id={tid} bucket={bucket}")
                  if bucket == "teacher_only_pass":
                      print("[EDGE FOUND] Teacher passed where student failed.")
                      print(f"[EDGE TEACHER BODY] {repr(t['candidate_body'][:300])}")
                      print(f"[EDGE STUDENT BODY] {repr(s['candidate_body'][:300])}")
                      if s["error"]:
                          print(f"[EDGE STUDENT ERROR] {s['error'][:500]}")

              teacher_only = [r for r in verbose_rows if r["bucket"] == "teacher_only_pass"]
              summary = {
                  "overall": counts,
                  "teacher_only_pass_examples": len(teacher_only),
              }
              return verbose_rows, teacher_only, summary


          def write_markdown_report(teacher_summary, student_summary, comparison_summary, teacher_only_rows):
              path = os.path.join(OUT_DIR, "report.md")
              with open(path, "w", encoding="utf-8") as f:
                  f.write("# HumanEval Gap Report\n\n")
                  f.write(f"- Teacher pass rate: {teacher_summary['pass_rate']}\n")
                  f.write(f"- Student pass rate: {student_summary['pass_rate']}\n\n")
                  f.write("## Teacher-pass / Student-fail examples\n\n")
                  for row in teacher_only_rows:
                      f.write(f"### {row['task_id']}\n")
                      f.write(f"- Entry point: `{row['entry_point']}`\n")
                      f.write(f"- Prompt:\n```python\n{row['prompt']}\n```\n")
                      f.write(f"- Teacher body:\n```python\n{row['teacher_body'][:1200]}\n```\n")
                      f.write(f"- Student body:\n```python\n{row['student_body'][:1200]}\n```\n")
                      if row["student_error"]:
                          f.write(f"- Student error:\n```text\n{row['student_error'][:1200]}\n```\n")
                      f.write("\n")
              return path


          def write_step_summary(teacher_summary, student_summary, comparison_summary):
              step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
              if not step_summary:
                  return
              with open(step_summary, "a", encoding="utf-8") as f:
                  f.write("## HumanEval Gap Summary\n\n")
                  f.write(f"- Teacher pass rate: **{teacher_summary['pass_rate']}**\n")
                  f.write(f"- Student pass rate: **{student_summary['pass_rate']}**\n")
                  f.write(f"- Teacher-only-pass: **{comparison_summary['overall']['teacher_only_pass']}**\n")
                  f.write(f"- Student-only-pass: **{comparison_summary['overall']['student_only_pass']}**\n")
                  f.write(f"- Both pass: **{comparison_summary['overall']['both_pass']}**\n")
                  f.write(f"- Both fail: **{comparison_summary['overall']['both_fail']}**\n")


          def print_console_summary(teacher_summary, student_summary, comparison_summary_serializable, teacher_only_rows, report_path):
              section("[5] FINAL CONSOLE SUMMARY")
              overall = comparison_summary_serializable["overall"]

              print("=" * 140)
              print("[OVERALL RESULT SUMMARY]")
              print("=" * 140)
              print(f"Teacher Model: {teacher_summary['model']}")
              print(f"Student Model: {student_summary['model']}")
              print(f"Teacher Pass Rate: {teacher_summary['pass_rate']}")
              print(f"Student Pass Rate: {student_summary['pass_rate']}")
              print(f"Teacher Mean TPS: {teacher_summary['mean_tps']}")
              print(f"Student Mean TPS: {student_summary['mean_tps']}")
              print()

              print("-" * 140)
              print("[COMPARISON BUCKETS]")
              print("-" * 140)
              print(f"Teacher only pass : {overall['teacher_only_pass']}")
              print(f"Student only pass : {overall['student_only_pass']}")
              print(f"Both pass         : {overall['both_pass']}")
              print(f"Both fail         : {overall['both_fail']}")
              print()

              print("-" * 140)
              print("[TOP TEACHER-EDGE EXAMPLES]")
              print("-" * 140)
              if not teacher_only_rows:
                  print("No teacher-only-pass examples found in this run.")
              else:
                  for row in teacher_only_rows[:10]:
                      print(f"TASK: {row['task_id']} | entry_point={row['entry_point']}")
                      print(f"Teacher passed={row['teacher_passed']} | Student passed={row['student_passed']}")
                      print(f"Prompt: {row['prompt'][:300]}")
                      print(f"Teacher body: {row['teacher_body'][:300]}")
                      print(f"Student body: {row['student_body'][:300]}")
                      if row["student_error"]:
                          print(f"Student error: {row['student_error'][:300]}")
                      print("-" * 140)

              print(
                  f"RESULT_LINE teacher_pass_rate={teacher_summary['pass_rate']} "
                  f"student_pass_rate={student_summary['pass_rate']} "
                  f"teacher_only_pass={overall['teacher_only_pass']} "
                  f"student_only_pass={overall['student_only_pass']} "
                  f"both_pass={overall['both_pass']} "
                  f"both_fail={overall['both_fail']}"
              )

              print("=" * 140)
              print("[JSON FINAL SUMMARY]")
              print("=" * 140)
              final_summary = {
                  "teacher_summary": teacher_summary,
                  "student_summary": student_summary,
                  "comparison_summary": comparison_summary_serializable,
                  "teacher_only_pass_preview_count": min(10, len(teacher_only_rows)),
                  "report_path": report_path,
              }
              print(json.dumps(final_summary, indent=2))


          def main():
              mp.set_start_method("fork", force=True)
              os.makedirs(OUT_DIR, exist_ok=True)

              banner("[SYSTEM INIT] DISTILLATION HUMANEVAL GAP RUN")
              print("[ENVIRONMENT]")
              print(f"Python: {sys.version}")
              print(f"Platform: {platform.platform()}")
              print(f"Machine: {platform.machine()}")
              print(f"Teacher model: {TEACHER_MODEL}")
              print(f"Student model: {STUDENT_MODEL}")
              print(f"HumanEval limit: {HUMANEVAL_LIMIT}")
              print(f"Max new tokens: {MAX_NEW_TOKENS_CODE}")
              print(f"Exec timeout seconds: {EXEC_TIMEOUT_SECONDS}")

              tasks = load_tasks()

              teacher_outputs, teacher_summary = run_model(TEACHER_MODEL, tasks, "teacher")
              with open(os.path.join(OUT_DIR, "teacher_outputs.json"), "w", encoding="utf-8") as f:
                  json.dump(teacher_outputs, f, indent=2)
              with open(os.path.join(OUT_DIR, "teacher_summary.json"), "w", encoding="utf-8") as f:
                  json.dump(teacher_summary, f, indent=2)

              student_outputs, student_summary = run_model(STUDENT_MODEL, tasks, "student")
              with open(os.path.join(OUT_DIR, "student_outputs.json"), "w", encoding="utf-8") as f:
                  json.dump(student_outputs, f, indent=2)
              with open(os.path.join(OUT_DIR, "student_summary.json"), "w", encoding="utf-8") as f:
                  json.dump(student_summary, f, indent=2)

              verbose_rows, teacher_only_rows, comparison_summary = compare(tasks, teacher_outputs, student_outputs)

              with open(os.path.join(OUT_DIR, "comparison_verbose.json"), "w", encoding="utf-8") as f:
                  json.dump(verbose_rows, f, indent=2)
              with open(os.path.join(OUT_DIR, "teacher_only_pass.json"), "w", encoding="utf-8") as f:
                  json.dump(teacher_only_rows, f, indent=2)

              comparison_summary_serializable = {
                  "overall": comparison_summary["overall"],
                  "teacher_only_pass_examples": comparison_summary["teacher_only_pass_examples"],
              }

              with open(os.path.join(OUT_DIR, "comparison_summary.json"), "w", encoding="utf-8") as f:
                  json.dump(comparison_summary_serializable, f, indent=2)

              report_path = write_markdown_report(
                  teacher_summary,
                  student_summary,
                  comparison_summary_serializable,
                  teacher_only_rows,
              )
              write_step_summary(teacher_summary, student_summary, comparison_summary_serializable)

              print_console_summary(
                  teacher_summary,
                  student_summary,
                  comparison_summary_serializable,
                  teacher_only_rows,
                  report_path,
              )


          if __name__ == "__main__":
              main()
          PY

      - name: Run HumanEval comparison
        shell: bash
        run: |
          set -euxo pipefail
          "${VENV_DIR}/bin/python" scripts/humaneval_gap.py

      - name: Upload HumanEval gap outputs
        uses: actions/upload-artifact@v4
        with:
          name: humaneval-gap-outputs
          path: |
            ${{ github.workspace }}/humaneval_gap_outputs
            ${{ github.workspace }}/scripts/humaneval_gap.py
